# test_login.yaml
testcase:
  id: "TC_001"
  name: "用户登录测试"
  status: "ready"
  steps:
    - name: "访问登录页面"
      action: "api.call"
      params:
        method: "GET"
        url: "https://api.example.com/login"
    
    - name: "输入用户名密码"
      action: "api.call"
      params:
        method: "POST"
        url: "https://api.example.com/login"
        data:
          username: "test_user"
          password: "123456"
      validate:
        - expect: "${response.status_code}"
          to_be: 200
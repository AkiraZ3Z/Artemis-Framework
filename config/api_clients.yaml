# config/api_clients.yaml
users_api:
  type: base
  base_url: "https://api.example.com/api/v1"
  timeout: 30
  headers:
    Accept: "application/json"
  auth:
    type: bearer
    token: "${AUTH_TOKEN}"

products_api:
  type: apikey
  base_url: "https://products.example.com"
  api_key: "${PRODUCTS_API_KEY}"
  key_name: "X-API-Key"
  location: "header"
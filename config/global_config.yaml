# ===================================================
# Artemis Framework 全局配置文件 (安全版)
# ===================================================
# 所有敏感信息（密码、token、密钥）都通过环境变量注入
# 配置采用分层结构，支持通过环境变量覆盖
# 环境变量前缀: ARTEMIS_ (例如 ARTEMIS_ENVIRONMENT=prod)

project:
  name: "Artemis Test Framework"
  version: "1.0.0"
  description: "基于Python的现代化自动化测试框架"
  author: "Akira"

# 当前环境: dev, test, staging, prod（可通过 ARTEMIS_ENVIRONMENT 环境变量覆盖）
environment: "test"

# ------------------------------------------------
# 日志系统配置（对齐 core.logger.LoggerConfig）
# ------------------------------------------------
logging:
  log_level: "INFO"                # DEBUG, INFO, WARNING, ERROR, CRITICAL
  log_dir: "reports/logs"          # 日志目录
  log_to_console: true
  log_to_file: true
  use_timestamp: true
  json_format: false               # 若为 true，日志输出为 JSON 格式
  console_color: true
  # 文件轮转配置
  task_max_bytes: 10485760          # 任务日志文件大小上限 (10 MB)
  task_backup_count: 7
  case_max_bytes: 5242880           # 用例日志文件大小上限 (5 MB)
  case_backup_count: 3

# ------------------------------------------------
# 测试数据配置
# ------------------------------------------------
test_data:
  data_dir: "data"
  fixtures_dir: "data/fixtures"
  dynamic_dir: "data/dynamic"
  sql_dir: "data/sql"

  # 测试账号（全部从环境变量读取，或使用变量生成）
  accounts:
    admin:
      username: "admin_${RANDOM.string}"
      password: "${ENV.ADMIN_PASSWORD}"
      role: "administrator"
    normal_user:
      username: "user_${RANDOM.string}"
      password: "${ENV.USER_PASSWORD}"
      role: "user"

# ------------------------------------------------
# 测试执行配置
# ------------------------------------------------
test_execution:
  testcase_dir: "testcases"
  test_suite_dir: "testcases/suite"

  executor:
    default_step_retry: 0
    retry_interval: 1.0
    step_timeout: 30
    stop_on_setup_failure: true
    stop_on_step_failure: false
    always_run_teardown: true

  parallel:          # 预留
    enabled: false
    max_workers: 4
    worker_timeout: 300

  filter:
    include_tags: []
    exclude_tags: []
    priority: []
    modules: []
    testcase_ids: []

# ------------------------------------------------
# 断言配置
# ------------------------------------------------
assertion:
  float_tolerance: 0.0001
  list_order_sensitive: true
  type_strict: false
  fail_log_level: "ERROR"

# ------------------------------------------------
# 报告配置
# ------------------------------------------------
reporting:
  output_dir: "reports"

  html:
    enabled: true
    output_dir: "reports/html"
    title: "Artemis 测试报告"
    auto_open: false

  junit:
    enabled: true
    report_dir: "reports/xml"
    file_name: "junit-test-results.xml"

  auto_open_report: false

# ------------------------------------------------
# 邮件通知配置（所有敏感信息使用环境变量）
# ------------------------------------------------
notification:
  email:
    enabled: false
    smtp_server: "${ENV.SMTP_SERVER}"
    smtp_port: "${ENV.SMTP_PORT}"
    use_tls: true
    username: "${ENV.SMTP_USERNAME}"
    password: "${ENV.SMTP_PASSWORD}"
    from_addr: "${ENV.SMTP_FROM_ADDR}"
    from_name: "Artemis Test Framework"
    to_addrs:
      - "${ENV.NOTIFY_TO_ADDR}"
    on_success: false
    on_failure: true
    on_error: true
    always: false
    subject: "[Artemis测试报告] "

# ------------------------------------------------
# 多环境专用配置（覆盖上层配置）
# ------------------------------------------------
environments:
  dev:
    logging:
      log_level: "DEBUG"
    services:
      user_service:
        base_url: "http://dev-api.example.com"
      order_service:
        base_url: "http://dev-api.example.com"

  test:
    logging:
      log_level: "INFO"
    services:
      user_service:
        base_url: "${ENV.USER_SERVICE_URL}"       # 优先环境变量
      order_service:
        base_url: "${ENV.ORDER_SERVICE_URL}"
      product_service:
        base_url: "${ENV.PRODUCT_SERVICE_URL}"
    test_data:
      accounts:
        admin:
          password: "${ENV.TEST_ADMIN_PASSWORD}"

  staging:
    api:
      verify_ssl: true
      default_timeout: 15
    services:
      user_service:
        base_url: "https://staging-api.example.com"
    notification:
      email:
        enabled: true
        to_addrs:
          - "qa-team@example.com"

  prod:
    logging:
      log_to_console: false
      log_level: "WARNING"
    services:
      user_service:
        base_url: "${ENV.PROD_USER_SERVICE_URL}"
    test_execution:
      filter:
        include_tags: ["prod_safe"]
    notification:
      email:
        enabled: true
        on_failure: true
        to_addrs:
          - "prod-alert@example.com"
          - "sre-team@example.com"

# ------------------------------------------------
# 微服务端点定义
# ------------------------------------------------
services:
  user_service:
    base_url: "${ENV.USER_SERVICE_URL}"
    api_version: "v1"
    endpoints:
      login: "/auth/login"
      register: "/auth/register"
      logout: "/auth/logout"
      get_user: "/users/{user_id}"
      list_users: "/users"
      update_user: "/users/{user_id}"
    timeout: 30
    auth_type: "bearer"
    auth_config:
      token: "${ENV.AUTH_TOKEN}"

  order_service:
    base_url: "${ENV.ORDER_SERVICE_URL}"
    api_version: "v1"
    endpoints:
      create_order: "/orders"
      get_order: "/orders/{order_id}"
      list_orders: "/orders"
      update_order: "/orders/{order_id}/status"
    timeout: 60

  product_service:
    base_url: "${ENV.PRODUCT_SERVICE_URL}"
    api_version: "v1"
    endpoints:
      list_products: "/products"
      get_product: "/products/{product_id}"
      search_products: "/products/search"

# ------------------------------------------------
# 数据库配置 (预留)
# ------------------------------------------------
database:
  enabled: false
  primary:
    dialect: "mysql"
    host: "${ENV.DB_HOST}"
    port: "${ENV.DB_PORT}"
    database: "test_db"
    username: "${ENV.DB_USERNAME}"
    password: "${ENV.DB_PASSWORD}"
    pool_size: 5
    echo_sql: false
  test:
    dialect: "sqlite"
    database: ":memory:"

# ------------------------------------------------
# 外部工具集成
# ------------------------------------------------
integrations:
  docker:
    enabled: false
    services:
      mysql:
        image: "mysql:8.0"
        ports: ["3306:3306"]
        env:
          MYSQL_ROOT_PASSWORD: "root"
          MYSQL_DATABASE: "test_db"
      redis:
        image: "redis:7-alpine"
        ports: ["6379:6379"]

  ci:
    jenkins:
      job_url: "${ENV.JENKINS_JOB_URL}"
      build_token: "${ENV.JENKINS_TOKEN}"
    github_actions:
      workflow_file: ".github/workflows/ci.yml"
      trigger_on: ["push", "pull_request"]

# ------------------------------------------------
# 插件扩展点
# ------------------------------------------------
plugins:
  step_handlers:
    - module: "custom_handlers.payment_handler"
      class: "PaymentStepHandler"
    - module: "custom_handlers.websocket_handler"
      class: "WebSocketStepHandler"
  reporters:
    - module: "custom_reporters.slack_reporter"
      class: "SlackReporter"
      config:
        webhook_url: "${ENV.SLACK_WEBHOOK_URL}"
        channel: "#test-automation"

# ------------------------------------------------
# 性能测试配置 (预留)
# ------------------------------------------------
performance:
  enabled: false
  think_time: 1.0
  users:
    min: 1
    max: 100
    ramp_up: 10
  duration:
    unit: "seconds"
    value: 300